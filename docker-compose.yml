services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leanmgmt
      POSTGRES_PASSWORD: leanmgmt
      POSTGRES_DB: leanmgmt_dev
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leanmgmt -d leanmgmt_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025'
      - '1025:1025'
