name: Terraform Apply (prod)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    if: ${{ secrets.AWS_TERRAFORM_ROLE_ARN_PROD != '' && secrets.TF_BACKEND_BUCKET_PROD != '' }}
    environment: production
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/prod
    env:
      AWS_REGION: eu-central-1
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN_PROD }}
          aws-region: eu-central-1

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET_PROD }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=eu-central-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_LOCK_TABLE_PROD }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN_PROD }}
          TF_VAR_github_repository: ${{ secrets.TF_VAR_GITHUB_REPOSITORY }}
          TF_VAR_terraform_remote_state_bucket_arn: ${{ secrets.TF_VAR_TERRAFORM_REMOTE_STATE_BUCKET_ARN_PROD }}
          TF_VAR_terraform_remote_state_lock_table_arn: ${{ secrets.TF_VAR_TERRAFORM_REMOTE_STATE_LOCK_TABLE_ARN_PROD }}
          TF_VAR_terraform_state_kms_key_arn: ${{ secrets.TF_VAR_TERRAFORM_STATE_KMS_KEY_ARN_PROD }}
