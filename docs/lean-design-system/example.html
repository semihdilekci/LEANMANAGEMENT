<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>Lean DS — Örnek</title>
<link rel="stylesheet" href="./index.css" />
<style>
  body {
    margin: 0;
    padding: 48px;
    background: var(--color-surface-0);
    color: var(--color-fg);
    font-family: var(--font-body);
  }
  .demo-grid {
    display: grid;
    gap: 24px;
    max-width: 720px;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: var(--text-3xl);
    margin: 0 0 8px;
  }
  p.sub {
    color: var(--color-fg-muted);
    margin: 0 0 24px;
  }
</style>
</head>
<body>
  <h1>Lean Design System</h1>
  <p class="sub">Tek dosyalık hızlı sağlık kontrolü.</p>

  <div class="demo-grid">
    <div>
      <button class="ls-btn ls-btn--primary">Birincil buton</button>
      <button class="ls-btn ls-btn--secondary" style="margin-left:8px">İkincil</button>
      <button class="ls-btn ls-btn--ghost" style="margin-left:8px">Ghost</button>
    </div>

    <div class="ls-card" style="padding: 20px;">
      <h3 style="margin:0 0 6px; font-family: var(--font-display);">Kart başlığı</h3>
      <p style="margin:0; color: var(--color-fg-muted);">
        Token + component sınıfları çalışıyorsa bu kart terracotta tonlarında görünmeli.
      </p>
    </div>
  </div>
</body>
</html>
